<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Der Riss — Trilogie-Navigator</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    :root {
      --cream: #f5f0e8; --ink: #1e1c19; --muted: #6b6259;
      --accent: #6b3a3a; --deep: #0f0e0c; --smoke: #8a8279;
      --paper: #f8f4ee; --paper-edge: #e8e0d4;
    }
    body {
      background: var(--deep); display: flex; justify-content: center;
      padding: 2rem 1rem; min-height: 100vh;
    }
    nav { display: none; }
    .wrap { width: 100%; max-width: 800px; }

    .page-title {
      text-align: center; padding: 1rem 0 0.5rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.7rem;
      letter-spacing: 0.4em; text-transform: uppercase; color: var(--smoke);
    }
    .page-subtitle {
      text-align: center; padding: 0 0 1.5rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      color: var(--smoke); letter-spacing: 0.05em;
    }
    .page-subtitle strong { color: var(--paper-edge); }

    /* Legend */
    .legend {
      display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap;
      padding-bottom: 1.5rem;
    }
    .legend-item {
      display: flex; align-items: center; gap: 0.3rem;
      font-family: 'Inter', sans-serif; font-size: 0.65rem;
      color: var(--smoke); letter-spacing: 0.02em;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Book card */
    .book-card {
      background: var(--paper);
      border-radius: 2px 6px 6px 2px;
      box-shadow: 0 0 0 1px var(--paper-edge), 0 12px 40px rgba(0,0,0,0.3);
      margin-bottom: 1.5rem; overflow: hidden; position: relative;
    }
    .book-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--paper-edge) 0%, #c8bfb0 50%, var(--paper-edge) 100%);
    }

    /* Buch-Header (klickbar) */
    .buch-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2rem; cursor: pointer; user-select: none;
      border-bottom: 1px solid rgba(107,58,58,0.06);
      transition: background 0.2s;
    }
    .buch-toggle:hover { background: rgba(107,58,58,0.02); }
    .buch-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .buch-num {
      font-family: 'Cormorant Garamond', serif; font-size: 0.65rem;
      letter-spacing: 0.35em; text-transform: uppercase; color: var(--smoke);
    }
    .buch-titel {
      font-family: 'Cormorant Garamond', serif; font-size: 1.5rem;
      font-weight: 400; letter-spacing: 0.08em; color: var(--ink);
    }
    .buch-sub {
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      color: var(--muted); font-style: italic;
    }
    .buch-right { display: flex; align-items: center; gap: 1rem; }
    .buch-stats {
      font-family: 'Inter', sans-serif; font-size: 0.65rem;
      color: var(--smoke); text-align: right; line-height: 1.6;
    }
    .buch-arrow {
      font-size: 1.2rem; color: var(--smoke); transition: transform 0.3s;
    }
    .buch-toggle.open .buch-arrow { transform: rotate(90deg); }

    /* Progress mini-bar im Buch-Header */
    .buch-progress {
      width: 80px; height: 3px; background: rgba(107,58,58,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .buch-progress-fill { height: 100%; border-radius: 2px; background: #2E8B57; }

    /* Buch-Inhalt */
    .buch-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .buch-body.open { max-height: 10000px; }

    /* Akt-Header (klickbar) */
    .akt-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 2rem 0.8rem 2.5rem; cursor: pointer; user-select: none;
      border-bottom: 1px solid rgba(107,58,58,0.06);
      transition: background 0.2s;
    }
    .akt-toggle:hover { background: rgba(107,58,58,0.02); }
    .akt-left { display: flex; align-items: baseline; gap: 0.6rem; }
    .akt-num {
      font-family: 'Cormorant Garamond', serif; font-size: 0.65rem;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--smoke);
    }
    .akt-titel {
      font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
      font-weight: 400; color: var(--ink);
    }
    .akt-right { display: flex; align-items: center; gap: 0.8rem; }
    .akt-dots { display: flex; gap: 3px; align-items: center; }
    .akt-dots .mini-dot {
      width: 5px; height: 5px; border-radius: 50%;
    }
    .akt-arrow {
      font-size: 0.9rem; color: var(--smoke); transition: transform 0.3s;
    }
    .akt-toggle.open .akt-arrow { transform: rotate(90deg); }

    /* Akt-Inhalt */
    .akt-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .akt-body.open { max-height: 5000px; }

    /* Kapitel-Block */
    .ch-block {
      border-bottom: 1px solid rgba(107,58,58,0.03);
    }
    .ch-block:last-child { border-bottom: none; }

    /* Kapitel-Zeile (klickbar) */
    .ch-row {
      display: grid; grid-template-columns: 50px 1fr auto auto;
      align-items: center; padding: 0.45rem 2rem 0.45rem 3.5rem; gap: 0.5rem;
      font-family: 'Cormorant Garamond', serif;
      transition: background 0.2s; cursor: pointer; user-select: none;
    }
    .ch-row:hover { background: rgba(107,58,58,0.03); }
    .ch-block.interlude .ch-row { font-style: italic; }
    .ch-block.interlude .ch-num,
    .ch-block.interlude .ch-title { color: var(--muted); }

    .ch-num { font-size: 0.75rem; color: var(--smoke); font-weight: 600; }
    .ch-title { font-size: 0.88rem; color: var(--ink); }
    .ch-pov {
      font-family: 'Inter', sans-serif; font-size: 0.6rem;
      color: var(--smoke); letter-spacing: 0.03em;
      background: rgba(107,58,58,0.04); padding: 0.15rem 0.4rem;
      border-radius: 2px; white-space: nowrap;
    }
    .ch-status {
      display: flex; align-items: center; gap: 0.35rem;
      font-family: 'Inter', sans-serif; font-size: 0.6rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      white-space: nowrap;
    }
    .ch-words {
      font-family: 'Inter', sans-serif; font-size: 0.6rem;
      color: var(--smoke); white-space: nowrap;
    }

    /* Szenen-Text (aufklappbar) */
    .ch-text {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 2rem 0 3.5rem;
    }
    .ch-text.open {
      max-height: 400px;
      padding: 0.4rem 2rem 0.8rem 3.5rem;
    }
    .ch-text p {
      font-family: 'Cormorant Garamond', serif; font-size: 0.88rem;
      line-height: 1.75; color: var(--muted); margin: 0;
      padding-left: 50px;
    }
    .ch-block.interlude .ch-text p { font-style: italic; }

    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Status-Farben */
    .s-idee        { color: #666; }
    .s-idee .dot   { background: #666; }
    .s-szenenplan        { color: #8B7355; }
    .s-szenenplan .dot   { background: #8B7355; }
    .s-entwurf        { color: #B8860B; }
    .s-entwurf .dot   { background: #B8860B; }
    .s-council        { color: #CD853F; }
    .s-council .dot   { background: #CD853F; }
    .s-logik-check        { color: #6B8E23; }
    .s-logik-check .dot   { background: #6B8E23; }
    .s-lektorat        { color: #4682B4; }
    .s-lektorat .dot   { background: #4682B4; }
    .s-final        { color: #2E8B57; }
    .s-final .dot   { background: #2E8B57; }

    /* Link zur Detail-Seite */
    .detail-link {
      display: inline-block; margin: 0.3rem 2rem 1rem 2.5rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.8rem;
      letter-spacing: 0.1em; text-decoration: none;
      color: var(--smoke); transition: color 0.3s;
    }
    .detail-link:hover { color: var(--ink); }

    @media (max-width: 600px) {
      .buch-toggle { padding: 1.2rem 1.2rem; }
      .akt-toggle { padding-left: 1.5rem; padding-right: 1.2rem; }
      .ch-row {
        grid-template-columns: 40px 1fr auto;
        padding-left: 2rem; padding-right: 1.2rem;
      }
      .ch-text { padding-left: 2rem; padding-right: 1.2rem; }
      .ch-text.open { padding-left: 2rem; padding-right: 1.2rem; }
      .ch-text p { padding-left: 40px; }
      .ch-pov { display: none; }
      .ch-words { display: none; }
      .buch-stats { display: none; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="page-title">Der Riss — Trilogie</div>
    <div class="page-subtitle" id="global-stats"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#666"></div> Idee</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8B7355"></div> Szenenplan</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B8860B"></div> Entwurf</div>
      <div class="legend-item"><div class="legend-dot" style="background:#CD853F"></div> Council</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6B8E23"></div> Logik-Check</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4682B4"></div> Lektorat</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2E8B57"></div> Final</div>
    </div>

    <div id="nav-tree"></div>
  </div>

  <script>
    const statusColors = {
      'idee': '#666', 'szenenplan': '#8B7355', 'entwurf': '#B8860B',
      'council': '#CD853F', 'logik-check': '#6B8E23', 'lektorat': '#4682B4',
      'final': '#2E8B57'
    };

    const buchDetailLinks = { buch1: 'buch1.html', buch2: 'buch2.html', buch3: 'buch3.html' };
    const buchLabels = { buch1: 'Buch I', buch2: 'Buch II', buch3: 'Buch III' };

    fetch('/buch/status.json')
      .then(r => r.json())
      .then(data => {
        const tree = document.getElementById('nav-tree');
        let totalChapters = 0, totalFinal = 0, totalWords = 0;

        ['buch1', 'buch2', 'buch3'].forEach((buchKey, bi) => {
          const buch = data[buchKey];
          const kapitel = buch.kapitel;
          const keys = Object.keys(kapitel);
          const buchTotal = keys.length;
          const buchFinal = keys.filter(k => kapitel[k].status === 'final').length;
          const buchWords = keys.reduce((s, k) => s + (kapitel[k].woerter || 0), 0);
          const buchPct = buchTotal ? Math.round((buchFinal / buchTotal) * 100) : 0;

          totalChapters += buchTotal;
          totalFinal += buchFinal;
          totalWords += buchWords;

          // Book card
          const card = document.createElement('div');
          card.className = 'book-card';

          // Book toggle
          const buchToggle = document.createElement('div');
          buchToggle.className = 'buch-toggle';
          buchToggle.innerHTML = `
            <div class="buch-left">
              <div class="buch-num">${buchLabels[buchKey]}</div>
              <div class="buch-titel">${buch.meta.titel}</div>
              <div class="buch-sub">${buch.meta.untertitel}</div>
            </div>
            <div class="buch-right">
              <div class="buch-stats">
                ${buchFinal} / ${buchTotal} final<br>
                ${buchWords ? buchWords.toLocaleString('de-DE') + ' W' : ''}
                <div class="buch-progress"><div class="buch-progress-fill" style="width:${buchPct}%"></div></div>
              </div>
              <div class="buch-arrow">&#x203A;</div>
            </div>
          `;
          card.appendChild(buchToggle);

          // Book body
          const buchBody = document.createElement('div');
          buchBody.className = 'buch-body';

          buch.akte.forEach((akt, ai) => {
            // Akt toggle
            const aktToggle = document.createElement('div');
            aktToggle.className = 'akt-toggle';

            // Mini-dots for act chapters
            const dotsHtml = akt.kapitel.map(k => {
              const ch = kapitel[k];
              if (!ch) return '';
              const col = statusColors[ch.status] || '#666';
              return `<div class="mini-dot" style="background:${col}"></div>`;
            }).join('');

            aktToggle.innerHTML = `
              <div class="akt-left">
                <div class="akt-num">${akt.name}</div>
                <div class="akt-titel">${akt.titel}</div>
              </div>
              <div class="akt-right">
                <div class="akt-dots">${dotsHtml}</div>
                <div class="akt-arrow">&#x203A;</div>
              </div>
            `;

            buchBody.appendChild(aktToggle);

            // Akt body
            const aktBody = document.createElement('div');
            aktBody.className = 'akt-body';

            akt.kapitel.forEach(key => {
              const ch = kapitel[key];
              if (!ch) return;
              const isInterlude = key.startsWith('I') || key === 'EP';

              const block = document.createElement('div');
              block.className = 'ch-block' + (isInterlude ? ' interlude' : '');

              const row = document.createElement('div');
              row.className = 'ch-row';

              const label = key === 'EP' ? 'EP' : (isInterlude ? key : 'Kap ' + key);
              const wordsHtml = ch.woerter
                ? `<div class="ch-words">${ch.woerter.toLocaleString('de-DE')} W</div>`
                : '';

              row.innerHTML = `
                <div class="ch-num">${label}</div>
                <div class="ch-title">${ch.titel}</div>
                <div class="ch-status s-${ch.status}"><div class="dot"></div> ${ch.status}</div>
                ${wordsHtml}
              `;
              block.appendChild(row);

              if (ch.text) {
                const textDiv = document.createElement('div');
                textDiv.className = 'ch-text';
                textDiv.innerHTML = `<p>${ch.text}</p>`;
                block.appendChild(textDiv);

                row.addEventListener('click', () => {
                  textDiv.classList.toggle('open');
                });
              }

              aktBody.appendChild(block);
            });

            buchBody.appendChild(aktBody);

            // Toggle akt
            aktToggle.addEventListener('click', () => {
              aktToggle.classList.toggle('open');
              aktBody.classList.toggle('open');
            });
          });

          // Detail link
          if (buchDetailLinks[buchKey]) {
            const link = document.createElement('a');
            link.className = 'detail-link';
            link.href = buchDetailLinks[buchKey];
            link.innerHTML = 'Kapitel-Details &rarr;';
            buchBody.appendChild(link);
          }

          card.appendChild(buchBody);
          tree.appendChild(card);

          // Toggle buch
          buchToggle.addEventListener('click', () => {
            buchToggle.classList.toggle('open');
            buchBody.classList.toggle('open');
          });
        });

        // Global stats
        document.getElementById('global-stats').innerHTML =
          `<strong>${totalFinal}</strong> / ${totalChapters} final &middot; <strong>${totalWords.toLocaleString('de-DE')}</strong> Worter gesamt`;
      });
  </script>
</body>
</html>
