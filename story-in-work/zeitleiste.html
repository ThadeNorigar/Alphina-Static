<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Der Riss — Zeitleiste</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    :root {
      --cream: #f5f0e8; --ink: #1e1c19; --muted: #6b6259;
      --accent: #6b3a3a; --deep: #0f0e0c; --smoke: #8a8279;
      --paper: #f8f4ee; --paper-edge: #e8e0d4;
      --thal: #b8860b; --thal-faint: rgba(184,134,11,0.08);
      --moragh: #6b3a3a; --moragh-faint: rgba(107,58,58,0.08);
    }
    body { background: var(--deep); display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    nav { display: none; }
    .wrap { width: 100%; max-width: 980px; }
    .page-title { text-align: center; padding: 1rem 0 0.3rem; font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--smoke); }
    .page-subtitle { text-align: center; padding: 0 0 0.3rem; font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; color: var(--smoke); letter-spacing: 0.05em; }
    .page-desc { text-align: center; padding: 0 2rem 1.2rem; font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 300; color: var(--smoke); line-height: 1.7; max-width: 700px; margin: 0 auto; }

    .filter-bar { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; padding: 0 0 1.5rem; }
    .filter-btn {
      display: flex; align-items: center; gap: 0.35rem; padding: 0.25rem 0.6rem;
      border-radius: 2px; font-family: 'Inter', sans-serif; font-size: 0.6rem;
      cursor: pointer; user-select: none;
      border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03);
      color: var(--smoke); transition: all 0.2s;
    }
    .filter-btn.active { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
    .filter-btn:hover { border-color: rgba(255,255,255,0.2); }
    .filter-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .tl-card {
      background: var(--paper); border-radius: 2px 6px 6px 2px;
      box-shadow: 0 0 0 1px var(--paper-edge), 0 12px 40px rgba(0,0,0,0.3);
      overflow: hidden; position: relative;
    }
    .tl-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--thal) 0%, var(--moragh) 100%);
    }
    .tl-columns { display: grid; grid-template-columns: 1fr 1fr; }

    .col-header { padding: 1.2rem 1.8rem 0.8rem; border-bottom: 1px solid rgba(107,58,58,0.06); }
    .col-header.thal { background: var(--thal-faint); }
    .col-header.moragh { background: var(--moragh-faint); }
    .col-header-num { font-family: 'Cormorant Garamond', serif; font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; }
    .col-header.thal .col-header-num { color: var(--thal); }
    .col-header.moragh .col-header-num { color: var(--moragh); }
    .col-header-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 400; color: var(--ink); }
    .col-header-sub { font-family: 'Inter', sans-serif; font-size: 0.62rem; color: var(--smoke); margin-top: 0.15rem; }

    .col-body { padding: 1rem 1.5rem 1.3rem; }
    .col-body.thal { background: var(--thal-faint); border-right: 1px solid rgba(107,58,58,0.04); }
    .col-body.moragh { background: var(--moragh-faint); }

    .tl-line { position: relative; padding-left: 1.6rem; }
    .tl-line::before { content: ''; position: absolute; left: 0; top: 0.5rem; bottom: 0.5rem; width: 1px; }
    .thal .tl-line::before { background: linear-gradient(180deg, var(--thal), rgba(184,134,11,0.1)); }
    .moragh .tl-line::before { background: linear-gradient(180deg, var(--moragh), rgba(107,58,58,0.1)); }

    .ev { position: relative; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(107,58,58,0.04); }
    .ev:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .ev::before { content: ''; position: absolute; left: -1.75rem; top: 0.4rem; width: 5px; height: 5px; border-radius: 50%; }
    .thal .ev::before { background: var(--thal); }
    .moragh .ev::before { background: var(--moragh); }

    .ev-time { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 300; color: var(--smoke); margin-bottom: 0.1rem; display: flex; gap: 0.4rem; align-items: baseline; flex-wrap: wrap; }
    .tz { color: var(--thal); } .mz { color: var(--moragh); }
    .ev-time .sep { color: rgba(107,98,89,0.3); }
    .ev-title { font-family: 'Cormorant Garamond', serif; font-size: 0.88rem; font-weight: 500; color: var(--ink); line-height: 1.3; }
    .ev-detail { font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 300; color: var(--muted); line-height: 1.6; margin-top: 0.1rem; }
    .ev-tags { display: flex; gap: 0.25rem; margin-top: 0.3rem; flex-wrap: wrap; }
    .tag { font-family: 'Inter', sans-serif; font-size: 0.48rem; padding: 0.08rem 0.35rem; border-radius: 2px; text-transform: uppercase; }
    .pov { font-family: 'Inter', sans-serif; font-size: 0.48rem; padding: 0.06rem 0.25rem; border-radius: 2px; background: rgba(107,58,58,0.05); color: var(--smoke); margin-left: 0.25rem; }
    /* Kapitel-Sektion */
    .kap-section {
      background: rgba(255,255,255,0.5); border: 1px solid rgba(107,58,58,0.1);
      border-radius: 3px; margin-bottom: 1rem; overflow: hidden;
    }
    .kap-section:last-child { margin-bottom: 0; }
    .kap-header {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.8rem;
      background: rgba(107,58,58,0.05); border-bottom: 1px solid rgba(107,58,58,0.08);
      cursor: pointer; user-select: none;
    }
    .kap-header:hover { background: rgba(107,58,58,0.08); }
    .kap-id {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700;
      color: var(--paper); background: var(--accent); padding: 0.15rem 0.4rem;
      border-radius: 2px; letter-spacing: 0.05em; min-width: 3.5rem; text-align: center;
    }
    .kap-pov { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 600; color: var(--ink); flex: 1; }
    .kap-status {
      font-family: 'Inter', sans-serif; font-size: 0.5rem; padding: 0.1rem 0.4rem;
      border-radius: 2px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    }
    .kap-status.final { background: rgba(90,122,90,0.15); color: #4a6a4a; }
    .kap-status.szenenplan { background: rgba(107,98,89,0.1); color: var(--smoke); }
    .kap-status.lektorat { background: rgba(184,134,11,0.12); color: #8b6914; }
    .kap-status.idee { background: rgba(107,98,89,0.06); color: var(--smoke); }
    .kap-datum { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--smoke); }
    .kap-body { padding: 0.5rem 0.8rem 0.6rem; }
    .kap-body .ev { margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(107,58,58,0.04); }
    .kap-body .ev:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .kap-body .ev::before { display: none; }
    .kap-empty { padding: 0.3rem 0.5rem; font-style: italic; color: var(--smoke); opacity: 0.3; font-size: 0.7rem; }

    .book-marker { background: rgba(107,58,58,0.04); border: 1px solid rgba(107,58,58,0.08); border-radius: 3px; padding: 0.4rem 0.5rem; margin-bottom: 1rem; }
    .thal .book-marker { border-color: rgba(184,134,11,0.12); background: rgba(184,134,11,0.04); }
    .book-marker .ev-time { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; }

    .month-marker {
      grid-column: 1 / -1; padding: 0.5rem 1.8rem;
      background: rgba(107,58,58,0.03);
      border-top: 1px solid rgba(107,58,58,0.06);
      border-bottom: 1px solid rgba(107,58,58,0.06);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .month-marker .mm-tz { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--thal); letter-spacing: 0.03em; }
    .month-marker .mm-label { font-family: 'Cormorant Garamond', serif; font-size: 0.82rem; font-weight: 500; color: var(--ink); letter-spacing: 0.08em; }
    .month-marker .mm-mz { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--moragh); letter-spacing: 0.03em; }

    .tl-gap { position: relative; text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-style: italic; color: var(--smoke); opacity: 0.45; padding: 0.4rem 0; margin-bottom: 1rem; }
    .tl-gap::before { content: ''; position: absolute; left: -1.6rem; top: 0; bottom: 0; width: 1px; border-left: 1px dashed rgba(107,58,58,0.12); }

    .sync-bridge-row {
      grid-column: 1 / -1; display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0.45rem 1.5rem;
      background: rgba(139,69,19,0.04);
      border-top: 1px solid rgba(139,69,19,0.08);
      border-bottom: 1px solid rgba(139,69,19,0.08);
    }
    .sync-left { text-align: right; padding-right: 0.8rem; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--thal); }
    .sync-center { font-family: 'Cormorant Garamond', serif; font-size: 0.75rem; color: #8b4513; text-align: center; white-space: nowrap; padding: 0.15rem 0.6rem; border-left: 1px dashed #8b4513; border-right: 1px dashed #8b4513; }
    .sync-right { text-align: left; padding-left: 0.8rem; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--moragh); }

    .empty-col { padding: 1rem 1.5rem; font-family: 'Cormorant Garamond', serif; font-size: 0.78rem; font-style: italic; color: var(--smoke); opacity: 0.4; }
    .empty-col.thal { background: var(--thal-faint); border-right: 1px solid rgba(107,58,58,0.04); }
    .empty-col.moragh { background: var(--moragh-faint); }

    .ev.hidden { display: none; }

    .buch-section {
      grid-column: 1 / -1; padding: 1.2rem 1.8rem 0.8rem;
      background: var(--deep); border-top: 3px solid var(--accent);
      text-align: center;
    }
    .buch-section-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      font-weight: 600; color: var(--paper); letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .buch-section-time {
      font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
      color: var(--smoke); margin-top: 0.2rem; letter-spacing: 0.05em;
    }

    @media (max-width: 700px) {
      .tl-columns { grid-template-columns: 1fr; }
      .sync-bridge-row { grid-template-columns: auto 1fr auto; padding: 0.4rem 1rem; }
      .month-marker { padding: 0.4rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="page-title">Der Riss — Zeitleiste</div>
    <div class="page-subtitle" id="subtitle"></div>
    <div class="page-desc" id="desc"></div>
    <div class="filter-bar" id="filters"></div>
    <div class="tl-card">
      <div class="tl-columns" id="timeline"></div>
    </div>
  </div>

  <script>
    const typColors = {
      portal: '#8b4513', begegnung: '#4a6a7a', erkenntnis: '#6a5080',
      erotik: '#8b3a5a', 'schlüssel': '#b8860b', tod: '#6b6259',
      tschechow: '#5a7a5a', hintergrund: '#555'
    };
    const typLabels = {
      portal: 'Portal', begegnung: 'Begegnung', erkenntnis: 'Erkenntnis',
      erotik: 'Erotik', 'schlüssel': 'Schlüssel', tod: 'Tod',
      tschechow: 'Tschechow', hintergrund: 'Hintergrund'
    };

    let activeFilters = new Set(Object.keys(typColors));

    function escHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderEvent(ev, side) {
      if (ev.luecke) return `<div class="tl-gap">${escHtml(ev.luecke)}</div>`;

      const typen = ev.typen || [];
      const primaryType = typen[0] || '';
      const isVisible = typen.length === 0 || typen.some(t => activeFilters.has(t));

      // Event dot color from primary type
      let dotStyle = '';
      if (primaryType === 'portal') dotStyle = `background:${typColors.portal}; width:7px; height:7px; left:-1.85rem; top:0.3rem;`;
      else if (typColors[primaryType]) dotStyle = `background:${typColors[primaryType]};`;

      // Time display (minimal — Buch/Kapitel/POV is in the group header)
      let timeHtml = '';

      // Tags
      const tagsHtml = (ev.tags || []).map(tag => {
        const tagType = typen.find(t => tag.toLowerCase().startsWith(t)) || typen[0] || '';
        const cssClass = tagType ? `tag-${tagType}` : '';
        return `<span class="tag ${cssClass}">${escHtml(tag)}</span>`;
      }).join('');

      const opacityClass = primaryType === 'hintergrund' ? ' style="opacity:0.55"' : '';
      const hiddenClass = isVisible ? '' : ' hidden';

      return `<div class="ev t-${primaryType}${hiddenClass}"${opacityClass} data-typen="${typen.join(',')}">
        ${dotStyle ? `<style>.ev.t-${primaryType}::before { ${dotStyle} }</style>` : ''}
        ${timeHtml ? `<div class="ev-time">${timeHtml}</div>` : ''}
        <div class="ev-title">${escHtml(ev.titel)}</div>
        ${ev.detail ? `<div class="ev-detail">${escHtml(ev.detail)}</div>` : ''}
        ${tagsHtml ? `<div class="ev-tags">${tagsHtml}</div>` : ''}
      </div>`;
    }

    function groupByKapitel(events) {
      const groups = [];
      const ungrouped = [];
      const kapMap = new Map();
      for (const ev of events) {
        const kap = ev.kapitel;
        if (!kap) { ungrouped.push(ev); continue; }
        if (!kapMap.has(kap)) {
          const g = { kapitel: kap, buch: ev.buch || '', pov: '', status: ev.kapitel_status || '', datum: ev.datum_text || '', events: [] };
          kapMap.set(kap, g);
          groups.push(g);
        }
        const g = kapMap.get(kap);
        g.events.push(ev);
        if (!g.pov && ev.pov) {
          // Extract POV name from "Kap 14 · Maren" or "Kap 36 - Alphina"
          const m = ev.pov.match(/[·\-]\s*(.+)/);
          g.pov = m ? m[1].trim() : ev.pov;
        }
        if (!g.datum && ev.datum_text) g.datum = ev.datum_text;
        if (!g.status && ev.kapitel_status) g.status = ev.kapitel_status;
        if (!g.buch && ev.buch) g.buch = ev.buch;
      }
      return { groups, ungrouped };
    }

    function renderKapitelGroup(group, side) {
      const kapLabel = group.kapitel.startsWith('I') ? group.kapitel : 'K' + group.kapitel;
      const buchLabel = group.buch || '';
      const statusClass = group.status || 'szenenplan';
      const statusText = group.status === 'final' ? 'final' : group.status === 'lektorat' ? 'lektorat' : group.status || '';

      let eventsHtml = group.events.map(e => renderEvent(e, side)).join('');

      return `<div class="kap-section">
        <div class="kap-header">
          <span class="kap-id">${buchLabel} ${kapLabel}</span>
          <span class="kap-pov">${escHtml(group.pov)}</span>
          ${statusText ? `<span class="kap-status ${statusClass}">${statusText}</span>` : ''}
          ${group.datum ? `<span class="kap-datum">${escHtml(group.datum)}</span>` : ''}
        </div>
        <div class="kap-body">${eventsHtml}</div>
      </div>`;
    }

    function renderTimeline(data) {
      const tl = document.getElementById('timeline');
      tl.innerHTML = '';

      // Column headers
      tl.innerHTML += `
        <div class="col-header thal">
          <div class="col-header-num">Thalassien (TZ)</div>
          <div class="col-header-title">Die Welt ohne Magie</div>
          <div class="col-header-sub">${escHtml(data.meta.zeitrechnung.tz_null)}</div>
        </div>
        <div class="col-header moragh">
          <div class="col-header-num">Moragh (MZ)</div>
          <div class="col-header-title">Die Welt mit Magie</div>
          <div class="col-header-sub">${escHtml(data.meta.zeitrechnung.verhaeltnis)}</div>
        </div>
      `;

      // 1. Flatten all events from all monate, tag with world
      const allEvents = [];
      data.monate.forEach(monat => {
        for (const ev of (monat.events.thalassien || [])) {
          allEvents.push({...ev, _world: 'thal', _buch: ev.buch || monat.buch || ''});
        }
        for (const ev of (monat.events.moragh || [])) {
          allEvents.push({...ev, _world: 'moragh', _buch: ev.buch || monat.buch || ''});
        }
      });

      // 2. Group by buch, then by kapitel
      const buchOrder = [];
      const buchMap = new Map();
      for (const ev of allEvents) {
        const b = ev._buch || 'Sonstiges';
        if (!buchMap.has(b)) { buchMap.set(b, []); buchOrder.push(b); }
        buchMap.get(b).push(ev);
      }

      // 3. Render: Buch → Kapitel-Zeilen (Thal links, Moragh rechts)
      buchOrder.forEach(buchName => {
        const events = buchMap.get(buchName);

        // Buch section header
        tl.innerHTML += `
          <div class="buch-section">
            <div class="buch-section-title">${escHtml(buchName)}</div>
          </div>
        `;

        // Group by kapitel, preserve order
        const kapOrder = [];
        const kapMap = new Map();
        for (const ev of events) {
          const k = ev.kapitel || '_ungrouped';
          if (!kapMap.has(k)) { kapMap.set(k, { thal: [], moragh: [] }); kapOrder.push(k); }
          kapMap.get(k)[ev._world].push(ev);
        }

        // Render each kapitel as a row spanning both columns
        kapOrder.forEach(kapId => {
          const kap = kapMap.get(kapId);
          const thalGroup = kap.thal.length > 0 ? buildGroup(kap.thal, kapId) : null;
          const moraghGroup = kap.moragh.length > 0 ? buildGroup(kap.moragh, kapId) : null;

          const leftHtml = thalGroup
            ? renderKapitelGroup(thalGroup, 'thal')
            : '<div class="kap-empty">&mdash;</div>';
          const rightHtml = moraghGroup
            ? renderKapitelGroup(moraghGroup, 'moragh')
            : '<div class="kap-empty">&mdash;</div>';

          tl.innerHTML += `
            <div class="col-body thal">${leftHtml}</div>
            <div class="col-body moragh">${rightHtml}</div>
          `;
        });
      });
    }

    function buildGroup(events, kapId) {
      const first = events[0] || {};
      const pov = (() => {
        for (const e of events) {
          if (e.pov) {
            const m = e.pov.match(/[·\-]\s*(.+)/);
            return m ? m[1].trim() : e.pov;
          }
        }
        return '';
      })();
      return {
        kapitel: kapId,
        buch: first.buch || first._buch || '',
        pov,
        status: first.kapitel_status || '',
        datum: events.find(e => e.datum_text)?.datum_text || '',
        events
      };
    }

    function applyFilters() {
      document.querySelectorAll('.ev[data-typen]').forEach(el => {
        const typen = el.dataset.typen.split(',').filter(Boolean);
        const visible = typen.length === 0 || typen.some(t => activeFilters.has(t));
        el.classList.toggle('hidden', !visible);
      });
    }

    fetch('/buch/zeitleiste.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('subtitle').textContent = data.meta.untertitel;
        document.getElementById('desc').textContent = data.meta.beschreibung;

        // Build filter buttons
        const filterBar = document.getElementById('filters');
        Object.entries(data.typen).forEach(([key, typ]) => {
          const btn = document.createElement('div');
          btn.className = 'filter-btn active';
          btn.dataset.typ = key;
          btn.innerHTML = `<span class="filter-dot" style="background:${typ.farbe}"></span> ${typ.label}`;
          btn.addEventListener('click', () => {
            if (activeFilters.has(key)) {
              activeFilters.delete(key);
              btn.classList.remove('active');
            } else {
              activeFilters.add(key);
              btn.classList.add('active');
            }
            applyFilters();
          });
          filterBar.appendChild(btn);
        });

        renderTimeline(data);
      });
  </script>
</body>
</html>
