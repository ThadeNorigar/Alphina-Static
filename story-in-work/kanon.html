<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Der Riss — Kanon</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="sidebar.css">
  <script src="sidebar.js" defer></script>
  <style>
    :root {
      --cream: #f5f0e8; --ink: #1e1c19; --muted: #6b6259;
      --accent: #6b3a3a; --deep: #0f0e0c; --smoke: #8a8279;
      --paper: #f8f4ee; --paper-edge: #e8e0d4;
    }
    body {
      background: var(--deep); display: flex; justify-content: center;
      padding: 2rem 1rem; min-height: 100vh;
    }
    nav { display: none; }
    .wrap { width: 100%; max-width: 820px; }

    .page-title {
      text-align: center; padding: 1rem 0 0.3rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.7rem;
      letter-spacing: 0.4em; text-transform: uppercase; color: var(--smoke);
    }
    .page-subtitle {
      text-align: center; padding: 0 0 0.8rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      color: var(--smoke); letter-spacing: 0.05em;
    }
    .page-desc {
      text-align: center; padding: 0 2rem 1.5rem;
      font-family: 'Inter', sans-serif; font-size: 0.72rem;
      color: var(--smoke); line-height: 1.7; max-width: 640px; margin: 0 auto;
    }

    .top-links {
      text-align: center; padding: 0 0 1.5rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      letter-spacing: 0.1em;
    }
    .top-links a {
      color: var(--paper-edge); text-decoration: none;
      border-bottom: 1px solid var(--smoke);
      padding-bottom: 2px; transition: all 0.3s;
    }
    .top-links a:hover { color: var(--accent); border-bottom-color: var(--accent); }
    .top-links .sep { color: var(--smoke); margin: 0 0.6rem; }

    .cat-card {
      background: var(--paper);
      border-radius: 2px 6px 6px 2px;
      box-shadow: 0 0 0 1px var(--paper-edge), 0 12px 40px rgba(0,0,0,0.3);
      margin-bottom: 1.5rem; overflow: hidden; position: relative;
    }
    .cat-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--paper-edge) 0%, #c8bfb0 50%, var(--paper-edge) 100%);
    }

    .cat-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.3rem 2rem; cursor: pointer; user-select: none;
      border-bottom: 1px solid rgba(107,58,58,0.06);
      transition: background 0.2s;
    }
    .cat-toggle:hover { background: rgba(107,58,58,0.02); }
    .cat-name {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      font-weight: 400; letter-spacing: 0.08em; color: var(--ink);
    }
    .cat-right { display: flex; align-items: center; gap: 1rem; }
    .cat-count {
      font-family: 'Inter', sans-serif; font-size: 0.68rem;
      color: var(--smoke); letter-spacing: 0.05em;
    }
    .cat-arrow {
      font-size: 1.1rem; color: var(--smoke); transition: transform 0.3s;
    }
    .cat-toggle.open .cat-arrow { transform: rotate(90deg); }

    .cat-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .cat-body.open { max-height: 5000px; }

    .doc-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.7rem 2rem 0.7rem 2.5rem;
      border-bottom: 1px solid rgba(107,58,58,0.04);
      text-decoration: none; color: inherit;
      transition: background 0.2s;
      gap: 1.2rem;
    }
    .doc-row:last-child { border-bottom: none; }
    .doc-row:hover { background: rgba(107,58,58,0.04); }

    .doc-main {
      display: flex; flex-direction: column; gap: 0.15rem; flex: 1;
    }
    .doc-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem;
      color: var(--ink); font-weight: 500;
    }
    .doc-desc {
      font-family: 'Inter', sans-serif; font-size: 0.7rem;
      color: var(--muted); line-height: 1.5; font-weight: 300;
    }
    .doc-slug {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      color: var(--smoke); white-space: nowrap;
    }

    @media (max-width: 600px) {
      .cat-toggle { padding: 1.1rem 1.2rem; }
      .doc-row { padding-left: 1.8rem; padding-right: 1.2rem; }
      .doc-slug { display: none; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="page-title">Der Riss — Kanon</div>
    <div class="page-subtitle" id="stats">…</div>
    <div class="page-desc">
      Welt, Stil, Magie, Figuren, Aktpläne. Alle Kanon-Dokumente lesen und mit Anmerkungen versehen.
    </div>

    <div class="top-links">
      <a href="index.html">&larr; Trilogie</a>
      <span class="sep">·</span>
      <a href="zeitleiste.html">Zeitleiste</a>
      <span class="sep">·</span>
      <a href="charaktere.html">Figuren-Übersicht</a>
    </div>

    <div id="cat-list"></div>
  </div>

<script>
  fetch('/buch/canon-manifest.json')
    .then(r => r.json())
    .then(manifest => {
      const list = document.getElementById('cat-list');
      let totalDocs = 0;
      manifest.categories.forEach((cat, ci) => {
        totalDocs += cat.docs.length;
        const card = document.createElement('div');
        card.className = 'cat-card';

        const toggle = document.createElement('div');
        toggle.className = 'cat-toggle';
        toggle.innerHTML = `
          <div class="cat-name">${cat.name}</div>
          <div class="cat-right">
            <div class="cat-count">${cat.docs.length} Dok.</div>
            <div class="cat-arrow">&#x203A;</div>
          </div>
        `;
        card.appendChild(toggle);

        const body = document.createElement('div');
        body.className = 'cat-body';
        cat.docs.forEach(d => {
          const row = document.createElement('a');
          row.className = 'doc-row';
          row.href = '/canon/?doc=' + encodeURIComponent(d.slug);
          row.innerHTML = `
            <div class="doc-main">
              <div class="doc-title">${d.title}</div>
              ${d.desc ? '<div class="doc-desc">' + d.desc + '</div>' : ''}
            </div>
            <div class="doc-slug">${d.slug}.md</div>
          `;
          body.appendChild(row);
        });
        card.appendChild(body);

        toggle.addEventListener('click', () => {
          toggle.classList.toggle('open');
          body.classList.toggle('open');
        });

        // Erste Kategorie default offen
        if (ci === 0) {
          toggle.classList.add('open');
          body.classList.add('open');
        }

        list.appendChild(card);
      });

      document.getElementById('stats').innerHTML =
        `<strong>${totalDocs}</strong> Dokumente &middot; ${manifest.categories.length} Kategorien`;
    })
    .catch(err => {
      document.getElementById('cat-list').innerHTML =
        '<p style="color:var(--smoke);text-align:center;padding:2rem;">Manifest konnte nicht geladen werden: ' + err.message + '</p>';
    });
</script>
</body>
</html>
