<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Die Schwelle — Leseprobe</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    :root {
      --cream: #f5f2ed;
      --warm: #e8e2d8;
      --ink: #1e1c19;
      --muted: #6b6259;
      --accent: #6b3a3a;
      --accent-faint: rgba(107, 58, 58, 0.08);
      --deep: #0f0e0c;
      --deep-text: #e8e2d8;
      --smoke: #8a8279;
      --header-gradient-end: #d8d0c4;
    }

    header { min-height: 50vh; }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 0.15em; }

    .chapter-nav {
      max-width: 640px;
      margin: 0 auto 3rem;
      padding: 0 2rem;
      text-align: center;
    }

    .chapter-nav a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: var(--smoke);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent-faint);
      border-radius: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    .chapter-nav a:hover { color: var(--ink); border-color: var(--accent); }
    .chapter-nav a.active { color: var(--ink); border-color: var(--accent); }

    .prose {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .prose p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      line-height: 2;
      color: var(--ink);
      margin-bottom: 1.5rem;
      text-indent: 1.5rem;
    }

    .prose p:first-child { text-indent: 0; }

    .prose p.scene-break {
      text-indent: 0;
      text-align: center;
      margin: 3rem 0;
      color: var(--accent);
      font-size: 1rem;
      letter-spacing: 0.3em;
    }

    .prose p.opening {
      text-indent: 0;
      font-size: 1.35rem;
      font-style: italic;
    }

    .chapter-end {
      text-align: center;
      margin-top: 4rem;
      padding: 2rem;
    }

    .chapter-end p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--smoke);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header>
    <div class="ornament"></div>
    <h1>Die Schwelle</h1>
    <p class="subtitle">Leseprobe</p>
  </header>

  <div class="chapter-nav">
    <a href="/lesen" class="active">Kapitel 1 — Alphina</a>
  </div>

  <div class="prose" id="chapter">
  </div>

  <div class="chapter-end">
    <p>Ende Kapitel 1</p>
  </div>

  <footer>
    <p>Unveröffentlichtes Manuskript. Alle Rechte vorbehalten.</p>
  </footer>

  <script>
    fetch('../buch/kapitel/01-alphina.md')
      .then(r => r.text())
      .then(md => {
        const lines = md.split('\n');
        const container = document.getElementById('chapter');
        let html = '';
        let isFirst = true;
        let skipTitle = true;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (skipTitle && line.startsWith('# ')) { skipTitle = false; continue; }
          if (line === '') continue;
          if (line === '---') {
            html += '<p class="scene-break">* * *</p>';
            continue;
          }
          if (line.startsWith('#')) continue;
          if (line.startsWith('*') && line.endsWith('*') && !line.startsWith('**')) {
            html += '<p style="text-indent:0; font-style:italic; text-align:center; color:var(--muted);">' + line.slice(1, -1) + '</p>';
            continue;
          }

          if (isFirst) {
            html += '<p class="opening">' + line + '</p>';
            isFirst = false;
          } else {
            html += '<p>' + line + '</p>';
          }
        }

        container.innerHTML = html;
      });
  </script>
</body>
</html>
