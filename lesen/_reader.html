<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Der Riss</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    :root {
      --cream: #f5f0e8;
      --warm: #ebe4d8;
      --ink: #1e1c19;
      --muted: #6b6259;
      --accent: #6b3a3a;
      --accent-faint: rgba(107, 58, 58, 0.06);
      --deep: #0f0e0c;
      --smoke: #8a8279;
      --page-shadow: rgba(30, 28, 25, 0.08);
      --paper: #f8f4ee;
      --paper-edge: #e8e0d4;
    }

    body {
      background: var(--deep);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    nav { display: none; }

    .book {
      position: relative;
      width: 100%;
      max-width: 700px;
      background: var(--paper);
      box-shadow:
        0 0 0 1px var(--paper-edge),
        -4px 0 8px var(--page-shadow),
        4px 0 8px var(--page-shadow),
        0 12px 40px rgba(0,0,0,0.3);
      border-radius: 2px 6px 6px 2px;
      overflow: hidden;
    }

    .book::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--paper-edge) 0%, #c8bfb0 50%, var(--paper-edge) 100%);
      z-index: 10;
    }

    .book::after {
      content: '';
      position: absolute;
      right: 0; top: 4px; bottom: 4px;
      width: 8px;
      background: repeating-linear-gradient(180deg, var(--paper) 0px, var(--paper-edge) 1px, var(--paper) 2px);
      border-radius: 0 2px 2px 0;
      z-index: 5;
    }

    .chapter-header {
      padding: 3rem 3rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--accent-faint);
    }

    .chapter-breadcrumb {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--smoke);
      margin-bottom: 1.2rem;
      line-height: 1.6;
    }

    .chapter-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--ink);
    }

    .chapter-ornament {
      margin-top: 1.5rem;
      color: var(--accent);
      font-size: 1.2rem;
      letter-spacing: 0.5em;
      opacity: 0.4;
    }

    .prose {
      padding: 2.5rem 3rem 3rem;
      padding-left: 3.5rem;
    }

    .prose p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 2;
      color: var(--ink);
      margin-bottom: 0;
      text-indent: 1.5rem;
    }

    .prose p + p { margin-top: 0; }
    .prose p:first-child { text-indent: 0; }

    .prose p.scene-break {
      text-indent: 0;
      text-align: center;
      margin: 2.5rem 0;
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.6em;
      opacity: 0.5;
    }

    .prose p.opening { text-indent: 0; }

    .prose p.date-line {
      text-indent: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      margin-bottom: 1.8rem;
      opacity: 0.8;
    }

    .prose p.date-line em { font-style: italic; }

    .prose p.opening::first-letter {
      font-size: 3.5rem;
      float: left;
      line-height: 0.8;
      padding-right: 0.15em;
      padding-top: 0.1em;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      color: var(--accent);
    }

    .prose em { font-style: italic; }

    .prose p.dialog {
      text-indent: 0;
      margin-top: 0.3rem;
    }

    .page-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem 2.5rem;
      border-top: 1px solid var(--accent-faint);
    }

    .page-nav-top {
      border-top: none;
      border-bottom: 1px solid var(--accent-faint);
      padding: 1.25rem 3rem 1.25rem;
    }

    .page-nav a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--smoke);
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.2rem;
      border-radius: 3px;
    }

    .page-nav a:hover { color: var(--ink); }

    .page-nav .disabled {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--smoke);
      opacity: 0.2;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.2rem;
    }

    .page-nav .page-info {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      color: var(--smoke);
      letter-spacing: 0.1em;
    }

    .page-nav .arrow { font-size: 1.1rem; line-height: 1; }

    .book-footer {
      text-align: center;
      padding: 1.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      color: var(--smoke);
      letter-spacing: 0.1em;
      opacity: 0.5;
    }

    .book.turning-forward { animation: turnForward 0.6s ease-in-out; }
    .book.turning-back { animation: turnBack 0.6s ease-in-out; }

    @keyframes turnForward {
      0% { transform: perspective(1200px) rotateY(0deg); }
      30% { transform: perspective(1200px) rotateY(-3deg); box-shadow: -4px 0 8px var(--page-shadow), 4px 0 8px var(--page-shadow), 0 12px 40px rgba(0,0,0,0.3), 15px 0 30px rgba(0,0,0,0.15); }
      100% { transform: perspective(1200px) rotateY(0deg); opacity: 0; }
    }

    @keyframes turnBack {
      0% { transform: perspective(1200px) rotateY(0deg); }
      30% { transform: perspective(1200px) rotateY(3deg); box-shadow: -4px 0 8px var(--page-shadow), 4px 0 8px var(--page-shadow), 0 12px 40px rgba(0,0,0,0.3), -15px 0 30px rgba(0,0,0,0.15); }
      100% { transform: perspective(1200px) rotateY(0deg); opacity: 0; }
    }

    .book.enter { animation: pageEnter 0.4s ease-out; }

    @keyframes pageEnter {
      from { opacity: 0; transform: perspective(1200px) rotateY(2deg); }
      to { opacity: 1; transform: perspective(1200px) rotateY(0deg); }
    }

    .draft-badge {
      margin-top: 1.2rem;
      text-align: center;
      min-height: 1.5rem;
    }
    .draft-link {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--smoke);
      text-decoration: none;
      border: 1px solid var(--paper-edge);
      padding: 0.3rem 0.9rem;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
      display: inline-block;
    }
    .draft-link:hover { color: var(--accent); border-color: var(--accent); }
    .draft-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--smoke);
      opacity: 0.5;
    }

    /* Entwurfs-Renderer */
    .entwurf-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent); margin-top: 2rem; margin-bottom: 0.3rem; text-indent: 0;
    }
    .entwurf-h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-top: 1.5rem; margin-bottom: 0.2rem; text-indent: 0;
    }
    .entwurf-h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--smoke); margin-top: 1rem; margin-bottom: 0.2rem; text-indent: 0;
    }
    .entwurf-p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; line-height: 1.75; color: var(--ink);
      text-indent: 0; margin-bottom: 0.3rem;
    }
    .entwurf-li {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem; line-height: 1.6; color: var(--muted);
      text-indent: 1.5rem; margin-bottom: 0;
    }
    .entwurf-table-row {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem; line-height: 1.5; color: var(--smoke);
      text-indent: 0; margin-bottom: 0; white-space: pre-wrap; word-break: break-all;
    }
    .entwurf-hr { border: none; border-top: 1px solid var(--paper-edge); margin: 1.5rem 0; }

    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      .chapter-header { padding: 2rem 1.5rem 2rem; }
      .chapter-breadcrumb { font-size: 0.7rem; letter-spacing: 0.2em; }
      .prose { padding: 1.5rem; padding-left: 2rem; }
      .page-nav { padding: 1.5rem; }
      .page-nav-top { padding: 1rem 1.5rem; }
      .prose p { font-size: 1.05rem; line-height: 1.9; }
    }

    /* ===== Comment UI (nur WIP-Modus) ===== */
    .prose p { position: relative; }

    .comment-trigger {
      position: absolute;
      right: -2rem;
      top: 0.2em;
      width: 1.4rem;
      height: 1.4rem;
      background: none;
      border: 1px solid var(--paper-edge);
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--smoke);
      padding: 0;
      line-height: 1;
    }
    .comment-trigger:hover { border-color: var(--accent); color: var(--accent); }
    .prose p:hover .comment-trigger { opacity: 1; }
    .prose p.has-comments .comment-trigger { opacity: 0.6; border-color: var(--accent); color: var(--accent); }
    .prose p.has-comments { border-left: 2px solid var(--accent); padding-left: 0.6rem; margin-left: -0.8rem; }

    .comment-popup {
      position: relative;
      margin: 0.5rem 0 1rem 0;
      background: var(--warm);
      border: 1px solid var(--paper-edge);
      border-radius: 4px;
      padding: 0.8rem 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
    }
    .comment-popup-close {
      position: absolute;
      top: 0.4rem; right: 0.6rem;
      background: none; border: none;
      cursor: pointer; font-size: 1.1rem;
      color: var(--smoke); line-height: 1;
    }
    .comment-list { margin-bottom: 0.6rem; }
    .comment-item {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--paper-edge);
      color: var(--ink);
      line-height: 1.5;
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-item-meta {
      font-size: 0.72rem;
      color: var(--smoke);
      letter-spacing: 0.05em;
      margin-top: 0.2rem;
    }
    .comment-empty {
      color: var(--smoke);
      font-style: italic;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
    }
    .comment-textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      background: var(--paper);
      border: 1px solid var(--paper-edge);
      border-radius: 3px;
      padding: 0.5rem;
      color: var(--ink);
      resize: vertical;
      min-height: 4rem;
      margin-top: 0.5rem;
    }
    .comment-submit {
      margin-top: 0.4rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.3rem 0.9rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .comment-submit:hover { background: var(--accent); color: var(--paper); }
    .comment-submit:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="grain"></div>

  <div class="book enter" id="book">
    <div class="page-nav page-nav-top" id="nav-top"></div>

    <div class="chapter-header">
      <div class="chapter-breadcrumb" id="ch-breadcrumb"></div>
      <h1 class="chapter-title" id="ch-title"></h1>
      <div class="chapter-ornament">— · —</div>
      <div class="draft-badge" id="draft-badge"></div>
    </div>

    <div class="prose" id="chapter"></div>

    <div class="page-nav" id="nav"></div>

    <div class="book-footer">
      Unveröffentlichtes Manuskript · Alle Rechte vorbehalten
    </div>
  </div>

  <script>
    const ZAHLWORT = {
      '01':'Eins','02':'Zwei','03':'Drei','04':'Vier','05':'Fünf',
      '06':'Sechs','07':'Sieben','08':'Acht','09':'Neun','10':'Zehn',
      '11':'Elf','12':'Zwölf','13':'Dreizehn','14':'Vierzehn','15':'Fünfzehn',
      '16':'Sechzehn','17':'Siebzehn','18':'Achtzehn','19':'Neunzehn','20':'Zwanzig',
      '21':'Einundzwanzig','22':'Zweiundzwanzig','23':'Dreiundzwanzig','24':'Vierundzwanzig',
      '25':'Fünfundzwanzig','26':'Sechsundzwanzig','27':'Siebenundzwanzig','28':'Achtundzwanzig',
      '29':'Neunundzwanzig','30':'Dreißig','31':'Einunddreißig','32':'Zweiunddreißig',
      '33':'Dreiunddreißig','34':'Vierunddreißig','35':'Fünfunddreißig','36':'Sechsunddreißig',
      '37':'Siebenunddreißig','38':'Achtunddreißig','39':'Neununddreißig','40':'Vierzig'
    };

    // Extract chapter ID from URL: /lesen/6/ -> "06", /lesen/I1/ -> "I1"
    const path = window.location.pathname.replace(/\/+$/, '');
    const slug = path.split('/').pop(); // "6", "I1", etc.
    const isInterludium = slug.startsWith('I');
    // Normalize: "6" -> "06", "I1" -> "I1"
    const kapId = isInterludium ? slug : slug.padStart(2, '0');

    // WIP mode: linked from /story-in-work/ with ?wip=1
    const urlParams = new URLSearchParams(window.location.search);
    const isWip = urlParams.has('wip');
    // Entwurfs-Modus: ?entwurf=1 zeigt entwurfs_datei statt datei
    const showEntwurf = urlParams.has('entwurf');

    fetch('/buch/status.json')
      .then(r => r.json())
      .then(data => {
        // Find the chapter across all books
        let ch = null;
        let buchData = null;
        let aktData = null;
        let allKapitelOrder = []; // flat ordered list of chapter IDs

        for (const buchKey of ['buch1', 'buch2', 'buch3']) {
          const buch = data[buchKey];
          if (!buch) continue;
          if (buch.kapitel[kapId]) {
            ch = buch.kapitel[kapId];
            buchData = buch;
            // Build flat chapter order from akte, find containing akt
            for (const akt of buch.akte) {
              if (akt.kapitel.includes(kapId)) aktData = akt;
              for (const k of akt.kapitel) {
                allKapitelOrder.push(k);
              }
            }
            break;
          }
        }

        // Pipeline v2: Auto-Auswahl welche Datei geladen wird
        // - Wenn ?entwurf=1 oder Status ist eine Entwurfs-Phase: lade entwurfs_datei
        // - Sonst: lade datei (das fertige Kapitel)
        const ENTWURFS_PHASEN = new Set(['entwurf', 'entwurf-checked', 'entwurf-ok', 'ausarbeitung']);
        const useEntwurf = ch && (showEntwurf || (ENTWURFS_PHASEN.has(ch.status) && !ch.datei));
        const targetDatei = ch && (useEntwurf ? ch.entwurfs_datei : (ch.datei || ch.entwurfs_datei));

        if (!ch || !targetDatei) {
          document.getElementById('ch-title').textContent = 'Kapitel nicht gefunden';
          return;
        }

        // Guard: non-final chapters only visible in WIP mode
        if (!isWip && ch.status !== 'final') {
          document.getElementById('ch-breadcrumb').textContent = '';
          document.getElementById('ch-title').textContent = 'Noch nicht verfügbar';
          document.getElementById('chapter').innerHTML = '<p style="text-align:center;color:var(--smoke);padding:3rem;">Dieses Kapitel ist noch in Arbeit.</p>';
          document.getElementById('nav').innerHTML = '';
          document.getElementById('nav-top').innerHTML = '';
          return;
        }

        // Breadcrumb: "Der Riss · Akt I · Kapitel Fünf"
        const buchTitel = (buchData.meta && buchData.meta.titel) ? buchData.meta.titel : '';
        const aktLabel = aktData ? aktData.name : '';
        let kapLabel;
        if (isInterludium) {
          const num = kapId.substring(1).padStart(2, '0');
          const wort = ZAHLWORT[num] || kapId.substring(1);
          kapLabel = 'Interludium ' + wort;
        } else {
          const wort = ZAHLWORT[kapId] || kapId;
          kapLabel = 'Kapitel ' + wort;
        }
        const breadcrumb = [buchTitel, aktLabel, kapLabel].filter(Boolean).join(' · ');
        document.getElementById('ch-breadcrumb').textContent = breadcrumb;

        // Set header — nur Name der Hauptperson (ch.pov)
        // Bei Entwurfs-Anzeige: prefix mit "Entwurf — "
        const titlePrefix = useEntwurf ? 'Entwurf — ' : '';
        document.getElementById('ch-title').textContent = titlePrefix + ch.pov;

        document.title = 'Der Riss — ' + titlePrefix + ch.pov;

        // Draft-Badge: Toggle zwischen Entwurf und finaler Fassung (nur in WIP-Modus)
        if (isWip) {
          const badge = document.getElementById('draft-badge');
          const baseUrl = '/lesen/' + (isInterludium ? slug : parseInt(slug).toString()) + '/';
          if (useEntwurf && ch.datei) {
            badge.innerHTML = `<a class="draft-link" href="${baseUrl}?wip">Entwurf &middot; Zur finalen Fassung &rarr;</a>`;
          } else if (!useEntwurf && ch.entwurfs_datei) {
            badge.innerHTML = `<a class="draft-link" href="${baseUrl}?wip&entwurf">&larr; Entwurf ansehen</a>`;
          } else if (useEntwurf) {
            badge.innerHTML = `<span class="draft-label">Entwurf</span>`;
          }
        }

        // Build navigation
        const myIdx = allKapitelOrder.indexOf(kapId);
        const prevId = myIdx > 0 ? allKapitelOrder[myIdx - 1] : null;
        const nextId = myIdx < allKapitelOrder.length - 1 ? allKapitelOrder[myIdx + 1] : null;

        const prevCh = prevId ? buchData.kapitel[prevId] : null;
        const nextCh = nextId ? buchData.kapitel[nextId] : null;

        // Determine if nav links should be active
        // In normal mode: only link to chapters with status "final"
        // In WIP mode: link to any chapter that has a datei OR entwurfs_datei
        function canLink(targetCh) {
          if (!targetCh) return false;
          const hasAny = !!(targetCh.datei || targetCh.entwurfs_datei);
          if (!hasAny) return false;
          if (isWip) return true;
          return targetCh.status === 'final';
        }

        function lesenUrl(id) {
          const numId = id.startsWith('I') ? id : parseInt(id).toString();
          return '/lesen/' + numId + '/' + (isWip ? '?wip' : '');
        }

        // Count readable chapters for page info
        const readable = allKapitelOrder.filter(k => {
          const c = buchData.kapitel[k];
          if (!c) return false;
          const hasAny = !!(c.datei || c.entwurfs_datei);
          return isWip ? hasAny : (c.status === 'final');
        });
        const myReadableIdx = readable.indexOf(kapId);
        const pageInfo = myReadableIdx >= 0
          ? (myReadableIdx + 1) + ' / ' + readable.length
          : (isInterludium ? 'Interludium' : '');

        let navHtml = '';

        if (prevId && canLink(prevCh)) {
          navHtml += `<a href="${lesenUrl(prevId)}" onclick="turnPage(event, 'back', '${lesenUrl(prevId)}')"><span class="arrow">&larr;</span> Zurück</a>`;
        } else {
          navHtml += `<span class="disabled"><span class="arrow">&larr;</span> Zurück</span>`;
        }

        navHtml += `<span class="page-info">${pageInfo}</span>`;

        if (nextId && canLink(nextCh)) {
          navHtml += `<a href="${lesenUrl(nextId)}" onclick="turnPage(event, 'forward', '${lesenUrl(nextId)}')">Weiter <span class="arrow">&rarr;</span></a>`;
        } else {
          navHtml += `<span class="disabled">Weiter <span class="arrow">&rarr;</span></span>`;
        }

        document.getElementById('nav').innerHTML = navHtml;
        document.getElementById('nav-top').innerHTML = navHtml;

        // Fetch and render the markdown — uses targetDatei (entwurfs_datei or datei)
        fetch('/buch/kapitel/' + targetDatei)
          .then(r => r.text())
          .then(md => {
            const lines = md.split('\n');
            const container = document.getElementById('chapter');
            container.innerHTML = useEntwurf ? renderEntwurf(lines) : renderProsa(lines);
            if (isWip) {
              container.dispatchEvent(new CustomEvent('chapter-rendered', {
                bubbles: true,
                detail: { container }
              }));
            }
          });
      });

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function inlineEntwurf(s) {
      return escHtml(s)
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }
    function renderEntwurf(lines) {
      let html = '';
      let skipFirst = true;
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === '') continue;
        if (skipFirst && line.startsWith('# ')) { skipFirst = false; continue; }
        if (line === '---') { html += '<div class="entwurf-hr"></div>'; continue; }
        if (line.startsWith('### ')) { html += '<p class="entwurf-h3">' + inlineEntwurf(line.slice(4)) + '</p>'; continue; }
        if (line.startsWith('## '))  { html += '<p class="entwurf-h2">' + inlineEntwurf(line.slice(3)) + '</p>'; continue; }
        if (line.startsWith('# '))   { html += '<p class="entwurf-h1">' + inlineEntwurf(line.slice(2)) + '</p>'; continue; }
        if (line.startsWith('|'))    { html += '<p class="entwurf-table-row">' + escHtml(line) + '</p>'; continue; }
        if (line.startsWith('- ') || line.startsWith('* ')) {
          html += '<p class="entwurf-li">' + inlineEntwurf(line.slice(2)) + '</p>'; continue;
        }
        html += '<p class="entwurf-p">' + inlineEntwurf(line) + '</p>';
      }
      return html;
    }
    function renderProsa(lines) {
      let html = '';
      let isFirst = true;
      let skipTitle = true;
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (skipTitle && line.startsWith('# ')) { skipTitle = false; continue; }
        if (line === '') continue;
        if (line === '---') {
          html += '<p class="scene-break">&middot; &middot; &middot;</p>';
          isFirst = true;
          continue;
        }
        if (line.startsWith('#')) continue;
        let processed = line.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        const isDialog = line.startsWith('"') || line.startsWith('\u201e') || line.startsWith('\u00ab');
        const isDateLine = isFirst && /^\*[^*]+\*$/.test(line);
        if (isDateLine) {
          html += '<p class="date-line">' + processed + '</p>';
        } else if (isFirst) {
          html += '<p class="opening">' + processed + '</p>';
          isFirst = false;
        } else if (isDialog) {
          html += '<p class="dialog">' + processed + '</p>';
        } else {
          html += '<p>' + processed + '</p>';
        }
      }
      return html;
    }

    function turnPage(e, direction, url) {
      e.preventDefault();
      const book = document.getElementById('book');
      book.classList.remove('enter');
      book.classList.add(direction === 'forward' ? 'turning-forward' : 'turning-back');
      setTimeout(() => { window.location.href = url; }, 500);
    }

    // ===== Comment UI (nur WIP-Modus) =====
    if (isWip) {
      const COMMENT_API = '/api/comments';
      const commentsByIdx = {};
      let activePopup = null;

      function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' })
          + ' ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      }

      function closeActivePopup() {
        if (activePopup) { activePopup.remove(); activePopup = null; }
      }

      function renderPopup(p, idx) {
        closeActivePopup();
        const popup = document.createElement('div');
        popup.className = 'comment-popup';
        popup.dataset.idx = idx;

        const closeBtn = document.createElement('button');
        closeBtn.className = 'comment-popup-close';
        closeBtn.textContent = '×';
        closeBtn.onclick = closeActivePopup;
        popup.appendChild(closeBtn);

        const list = document.createElement('div');
        list.className = 'comment-list';
        const existing = commentsByIdx[idx] || [];
        if (existing.length === 0) {
          list.innerHTML = '<p class="comment-empty">Noch keine Anmerkungen.</p>';
        } else {
          existing.forEach(c => {
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = '<div>' + escHtml(c.text) + '</div><div class="comment-item-meta">' + formatDate(c.created_at) + '</div>';
            list.appendChild(item);
          });
        }
        popup.appendChild(list);

        const textarea = document.createElement('textarea');
        textarea.className = 'comment-textarea';
        textarea.placeholder = 'Anmerkung …';
        popup.appendChild(textarea);

        const submitBtn = document.createElement('button');
        submitBtn.className = 'comment-submit';
        submitBtn.textContent = 'Anmerken';
        submitBtn.onclick = async () => {
          const text = textarea.value.trim();
          if (!text) return;
          submitBtn.disabled = true;
          submitBtn.textContent = '…';
          const absatzText = p.textContent.slice(0, 120);
          const modus = showEntwurf ? 'entwurf' : 'final';
          try {
            const r = await fetch(COMMENT_API, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ kapitel_id: kapId, modus, absatz_idx: idx, absatz_text: absatzText, text }),
            });
            if (!r.ok) throw new Error('Fehler ' + r.status);
            if (!commentsByIdx[idx]) commentsByIdx[idx] = [];
            commentsByIdx[idx].push({ text, created_at: new Date().toISOString() });
            p.classList.add('has-comments');
            closeActivePopup();
            renderPopup(p, idx);
          } catch (e) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Fehler — nochmal';
          }
        };
        popup.appendChild(submitBtn);

        p.insertAdjacentElement('afterend', popup);
        activePopup = popup;
        textarea.focus();
      }

      function initComments(container) {
        const modus = showEntwurf ? 'entwurf' : 'final';
        fetch(COMMENT_API + '?kapitel=' + kapId + '&modus=' + modus)
          .then(r => r.json())
          .then(comments => {
            comments.forEach(c => {
              if (!commentsByIdx[c.absatz_idx]) commentsByIdx[c.absatz_idx] = [];
              commentsByIdx[c.absatz_idx].push(c);
            });

            const paras = container.querySelectorAll('p');
            paras.forEach((p, idx) => {
              const btn = document.createElement('button');
              btn.className = 'comment-trigger';
              btn.title = 'Anmerkung';
              btn.textContent = '✎';
              btn.onclick = (e) => {
                e.stopPropagation();
                if (activePopup && parseInt(activePopup.dataset.idx) === idx) {
                  closeActivePopup();
                } else {
                  renderPopup(p, idx);
                }
              };
              p.appendChild(btn);

              if (commentsByIdx[idx] && commentsByIdx[idx].length > 0) {
                p.classList.add('has-comments');
              }
            });

            document.addEventListener('click', (e) => {
              if (activePopup && !activePopup.contains(e.target)) {
                closeActivePopup();
              }
            });
          })
          .catch(() => {});
      }

      document.addEventListener('chapter-rendered', (e) => {
        initComments(e.detail.container);
      });
    }
  </script>
